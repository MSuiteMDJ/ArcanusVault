<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arcanus Loading</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at center,
        #20103d 0%,
        #090012 45%,
        #020206 100%);

    font-family:
        "Segoe UI",
        sans-serif;

    color:white;
}

/* background glow */

.background-glow{
    position:absolute;

    width:800px;
    height:800px;

    border-radius:50%;

    background:
    radial-gradient(
        circle at center,
        rgba(138, 43, 226, 0.15) 0%,
        rgba(75, 0, 130, 0.05) 40%,
        transparent 70%);

    filter: blur(40px);

    animation: pulse 4s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% {
        opacity: 0.8;
        transform: scale(1);
    }
    50% {
        opacity: 1;
        transform: scale(1.05);
    }
}

/* main container */

.container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
}

/* logo */

.logo {
    width: 120px;
    height: 120px;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-20px);
    }
}

/* loader */

.loader {
    position: relative;
    width: 50px;
    height: 50px;
}

.loader::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border: 3px solid transparent;
    border-top: 3px solid #8a2be2;
    border-right: 3px solid #4b0082;
    border-radius: 50%;
    animation: spin 2s linear infinite;
}

@keyframes spin {
    0% {
        transform: rotate(0deg);
    }
    100% {
        transform: rotate(360deg);
    }
}

/* text */

.text {
    text-align: center;
}

.text h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #8a2be2, #4b0082);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.text p {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.6);
    opacity: 0;
    animation: fadeInOut 2s ease-in-out infinite;
}

@keyframes fadeInOut {
    0%, 100% {
        opacity: 0;
    }
    50% {
        opacity: 1;
    }
}

</style>

</head>

<body>

<div class="background-glow"></div>

<div class="container">
    <!-- Start: Arcanus logo -->
    <img src="Arcanus.Logo.png" alt="Arcanus logo" class="logo">
    <!-- End: Arcanus logo -->

    <!-- Loader -->
    <div class="loader"></div>

    <!-- Text -->
    <div class="text">
        <h1>Arcanus Vault OS</h1>
        <p>Starting system...</p>
    </div>
</div>

</body>

</html>
