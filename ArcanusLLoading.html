<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arcanus Loading</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at center,
        #20103d 0%,
        #090012 45%,
        #020206 100%);

    font-family:
        "Segoe UI",
        sans-serif;

    color:white;
}

/* background glow */

.background-glow{
    position:absolute;

    width:800px;
    height:800px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        rgba(133,76,255,.25),
        transparent 70%
    );

    animation:
        pulseGlow 4s ease-in-out infinite;
}

@keyframes pulseGlow{

    0%,100%{
        transform:scale(1);
        opacity:.5;
    }

    50%{
        transform:scale(1.15);
        opacity:1;
    }
}

/* container */

.loader{
    position:relative;

    display:flex;
    flex-direction:column;
    align-items:center;

    z-index:10;
}

/* logo area */

.logo-wrap{
    position:relative;

    width:260px;
    height:260px;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* ring */

.ring{
    position:absolute;

    width:220px;
    height:220px;

    border-radius:50%;

    border:2px solid rgba(140,100,255,.25);

    box-shadow:
        0 0 30px rgba(140,100,255,.5),
        inset 0 0 20px rgba(140,100,255,.3);
}

/* comet */

.orbit{
    position:absolute;

    width:220px;
    height:220px;

    animation:
        spin 6s linear infinite;
}

.comet{
    position:absolute;

    width:14px;
    height:14px;

    background:white;

    border-radius:50%;

    top:-7px;
    left:103px;

    box-shadow:
        0 0 10px white,
        0 0 25px #c89cff,
        0 0 50px #854cff;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

/* logo */

.logo{

    width:150px;
    z-index:5;

    filter:
        drop-shadow(0 0 15px rgba(255,255,255,.7))
        drop-shadow(0 0 40px rgba(180,120,255,.8))
        drop-shadow(0 0 80px rgba(133,76,255,.8));
}

/* brand */

.brand{

    margin-top:20px;

    font-size:56px;
    font-weight:700;

    letter-spacing:12px;

    color:white;

    text-shadow:
        0 0 10px white,
        0 0 20px #b17dff,
        0 0 40px #854cff;

    animation:flicker 4s infinite;
}

@keyframes flicker{

    0%,100%{
        opacity:1;
    }

    48%{
        opacity:1;
    }

    50%{
        opacity:.8;
    }

    52%{
        opacity:1;
    }
}

/* product */

.product{

    margin-top:12px;

    color:#d9c8ff;

    letter-spacing:4px;

    font-size:14px;

    text-transform:uppercase;
}

/* status */

.status{

    margin-top:30px;

    color:#a89de8;

    font-size:14px;
}

/* dots */

.dots{
    display:flex;
    gap:8px;

    margin-top:16px;
}

.dots span{

    width:8px;
    height:8px;

    border-radius:50%;

    background:#b88dff;

    animation:bounce 1.4s infinite;
}

.dots span:nth-child(2){
    animation-delay:.2s;
}

.dots span:nth-child(3){
    animation-delay:.4s;
}

@keyframes bounce{

    0%,80%,100%{
        transform:scale(.2);
        opacity:.3;
    }

    40%{
        transform:scale(1);
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="background-glow"></div>

<div class="loader">

    <div class="logo-wrap">

        <div class="ring"></div>

        <div class="orbit">
            <div class="comet"></div>
        </div>

        <!-- YOUR REAL LOGO -->
        <img
            src="ArcanusLogo.png"
            class="logo"
            alt="Arcanus Logo">

    </div>

    <div class="brand">
        ARCANUS
    </div>

    <div class="product">
        Arcanus OS
    </div>

    <div class="status">
        Preparing Secure Workspace...
    </div>

    <div class="dots">
        <span></span>
        <span></span>
        <span></span>
    </div>

</div>

</body>
</html>
