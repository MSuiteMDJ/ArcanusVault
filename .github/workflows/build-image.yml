name: Build AV Vault OS Image

on:
  push:
    branches:
      - main
    paths:
      - 'branding/**'
      - 'build/**'
      - 'scripts/**'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:
    inputs:
      upload_artifacts:
        description: 'Upload build artifacts'
        required: false
        default: 'true'

env:
  BOARD: x96q
  RELEASE: trixie
  BUILD_MINIMAL: "yes"
  BUILD_DESKTOP: "no"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            wget \
            bc \
            libncurses5-dev \
            libssl-dev \
            bison \
            flex \
            device-tree-compiler \
            cpio \
            xz-utils \
            u-boot-tools
          
          echo "=== Build tools installed ==="
          echo "gcc: $(gcc --version | head -1)"
          echo "git: $(git --version)"
          echo "xz: $(xz --version | head -1)"

      - name: Clone Armbian repository
        run: |
          mkdir -p /tmp/build
          cd /tmp/build
          
          echo "=== Available disk space ==="
          df -h /tmp
          
          git clone --depth=1 https://github.com/armbian/build.git armbian
          cd armbian
          git checkout main
          
          echo "=== Armbian ready ==="
          ls -la compile.sh

      - name: Prepare build directory
        run: |
          cd /tmp/build/armbian
          mkdir -p userpatches/overlay
          mkdir -p cache/sources
          mkdir -p cache/debs
          
          echo "=== Disk space check ==="
          df -h /tmp
          AVAILABLE=$(df /tmp | awk 'NR==2 {print $4}')
          AVAILABLE_GB=$((AVAILABLE / 1024 / 1024))
          echo "Available in /tmp: ${AVAILABLE_GB}GB"
          
          if [ $AVAILABLE_GB -lt 20 ]; then
            echo "WARNING: Low disk space (< 20GB available)"
          fi

      - name: Copy branding overlay
        run: |
          cp -r ${{ github.workspace }}/branding/rootfs/* /tmp/build/armbian/userpatches/overlay/

      - name: Copy custom kernel config (if exists)
        run: |
          if [ -f "${{ github.workspace }}/build/config/kernel-config" ]; then
            cp ${{ github.workspace }}/build/config/kernel-config /tmp/build/armbian/userpatches/
          fi

      - name: Run Armbian build
        run: |
          cd /tmp/build/armbian
          ./compile.sh \
            BOARD=${{ env.BOARD }} \
            RELEASE=${{ env.RELEASE }} \
            BUILD_MINIMAL=${{ env.BUILD_MINIMAL }} \
            BUILD_DESKTOP=${{ env.BUILD_DESKTOP }} \
            KERNEL_CONFIGURE=no \
            COMPRESS_OUTPUTIMAGE=xz \
            ARTIFACT_IGNORE_CACHE=yes \
            2>&1 | tee build.log
          
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "Armbian build failed with exit code $BUILD_EXIT"
            echo ""
            echo "=== Last 50 lines of build log ==="
            tail -50 build.log
            exit 1
          fi

      - name: Locate built image
        id: image
        run: |
          echo "Searching for image files in output directory..."
          
          # Search for image files in multiple possible locations
          for dir in /tmp/build/armbian/output/images /tmp/build/armbian/output /tmp/build/armbian; do
            if [ -d "$dir" ]; then
              echo "Checking: $dir"
              find "$dir" -maxdepth 2 -type f \( -name "*.img*" -o -name "*.xz" \) 2>/dev/null | head -10
            fi
          done
          
          # Try to find .img.xz first
          IMAGE_PATH=$(find /tmp/build/armbian -name "*.img.xz" -type f 2>/dev/null | head -1)
          
          # If not found, look for uncompressed .img and we'll compress it
          if [ -z "$IMAGE_PATH" ]; then
            IMAGE_PATH=$(find /tmp/build/armbian -name "*.img" -type f 2>/dev/null | head -1)
            NEEDS_COMPRESSION=true
          fi
          
          if [ -z "$IMAGE_PATH" ]; then
            echo "ERROR: No image found (.img or .img.xz)"
            echo ""
            echo "=== Contents of /tmp/build/armbian/output ==="
            ls -laR /tmp/build/armbian/output/ 2>/dev/null || echo "Directory not found"
            exit 1
          fi
          
          echo "Found image: $IMAGE_PATH"
          echo "image_path=$IMAGE_PATH" >> $GITHUB_OUTPUT
          echo "needs_compression=${NEEDS_COMPRESSION:-false}" >> $GITHUB_OUTPUT

      - name: Compress image if needed
        run: |
          IMAGE_PATH="${{ steps.image.outputs.image_path }}"
          NEEDS_COMPRESSION="${{ steps.image.outputs.needs_compression }}"
          
          if [ "$NEEDS_COMPRESSION" = "true" ]; then
            echo "Compressing image with xz..."
            xz -v "$IMAGE_PATH"
            IMAGE_PATH="${IMAGE_PATH}.xz"
            echo "IMAGE_PATH=$IMAGE_PATH" >> $GITHUB_ENV
          else
            echo "IMAGE_PATH=$IMAGE_PATH" >> $GITHUB_ENV
          fi

      - name: Rename artifact
        run: |
          SOURCE="${{ env.IMAGE_PATH }}"
          DEST="/tmp/build/AVVaultOS-X96Q-H313-trixie-minimal.img.xz"
          
          if [ ! -f "$SOURCE" ]; then
            echo "ERROR: Source file not found: $SOURCE"
            exit 1
          fi
          
          cp "$SOURCE" "$DEST"
          echo "ARTIFACT_PATH=$DEST" >> $GITHUB_ENV

      - name: Verify image size
        run: |
          ls -lh "${{ env.ARTIFACT_PATH }}"
          FILE_SIZE=$(stat -f%z "${{ env.ARTIFACT_PATH }}" 2>/dev/null || stat -c%s "${{ env.ARTIFACT_PATH }}")
          echo "Image size: $((FILE_SIZE / 1024 / 1024 / 1024)) GB"

      - name: Upload to GitHub Release
        if: github.event_name == 'push' || github.event.inputs.upload_artifacts == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ARTIFACT_PATH }}
          tag_name: build-${{ github.run_number }}
          body: |
            **AV Vault OS Build ${{ github.run_number }}**
            
            Board: x96q (Allwinner H313)
            Release: Debian Trixie
            Type: Minimal/Headless
            
            Commit: ${{ github.sha }}
            
            **Image Details:**
            - Hostname: av-vault
            - SSH: Enabled
            - Branding: Applied
            - Storage tools included
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        if: always()
        run: |
          echo "=== Build Summary ==="
          echo "Board: ${{ env.BOARD }}"
          echo "Release: ${{ env.RELEASE }}"
          echo "Build Type: Minimal"
          if [ -f "/tmp/build/armbian/build.log" ]; then
            echo ""
            echo "=== Build Log (last 50 lines) ==="
            tail -50 /tmp/build/armbian/build.log
          fi
