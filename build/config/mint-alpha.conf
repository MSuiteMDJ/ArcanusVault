# Arcanus OS Alpha target configuration.
# Values can be overridden by exporting the same variable before running build/build-iso.sh.

: "${BASE_DISTRO:=Linux Mint}"
: "${BASE_DESKTOP:=XFCE}"
: "${BRANDING_NAME:=Arcanus OS}"
: "${BRANDING_VERSION:=Alpha 0.1}"
: "${BRANDING_HOSTNAME:=arcanus}"
: "${OUTPUT_ISO_NAME:=ArcanusOS-Alpha-x86_64.iso}"
: "${ISO_VOLUME_ID:=ARCANUS_ALPHA}"

: "${MINT_VERSION:=22.3}"
: "${MINT_CODENAME:=Zena}"
: "${MINT_ISO_BASE_URL:=https://mirrors.edge.kernel.org/linuxmint/stable/22.3}"
: "${MINT_DEFAULT_ISO_NAME:=linuxmint-22.3-xfce-64bit.iso}"
: "${MINT_ISO_URL:=${MINT_ISO_BASE_URL}/${MINT_DEFAULT_ISO_NAME}}"
: "${MINT_SHA256_URL:=${MINT_ISO_BASE_URL}/sha256sum.txt}"
: "${MINT_ISO_NAME:=$(basename "$MINT_ISO_URL")}"

: "${THEME_NAME:=Arcanus-Dark}"
: "${ICON_THEME:=Mint-Y}"
: "${PRIMARY_PURPLE:=#854CFF}"
: "${DARK_PURPLE:=#4E2D9E}"
: "${BACKGROUND:=#050510}"
: "${TEXT:=#FFFFFF}"
: "${ACCENT:=#CFC3FF}"
